# [R7] Docker Compose — 개발 환경

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentshield
      POSTGRES_USER: agentshield
      POSTGRES_PASSWORD: agentshield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentshield -d agentshield"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  chromadb:
    image: chromadb/chroma:latest
    container_name: agentshield-chroma
    ports:
      - "8003:8000" # 호스트의 8003번 포트로 연결 (포트 충돌 방지)
    volumes:
      - chromadata:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE

  chroma-ui:
    image: fengzhichao/chromadb-admin:latest
    container_name: agentshield-chroma-ui
    ports:
      - "8004:3001" # 이 이미지는 내부적으로 3001 포트를 사용합니다.
    depends_on:
      - chromadb

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://agentshield:agentshield@db:5432/agentshield
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CHROMADB_MODE: http
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      PHASE1_ALLOW_FILE_FALLBACK: "true"
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_RED_MODEL: ${OLLAMA_RED_MODEL}
      OLLAMA_JUDGE_MODEL: ${OLLAMA_JUDGE_MODEL}
      OLLAMA_GUARD_MODEL: ${OLLAMA_GUARD_MODEL}
      OLLAMA_BLUE_MODEL: ${OLLAMA_BLUE_MODEL}
      OLLAMA_BASE_TARGET_MODEL: ${OLLAMA_BASE_TARGET_MODEL}
      OLLAMA_RED_TARGET_MODEL: ${OLLAMA_RED_TARGET_MODEL}
      OLLAMA_JUDGE_TARGET_MODEL: ${OLLAMA_JUDGE_TARGET_MODEL}
      OLLAMA_BLUE_TARGET_MODEL: ${OLLAMA_BLUE_TARGET_MODEL}
      OLLAMA_GENERATION_API: ${OLLAMA_GENERATION_API:-generate}
      LLM_REQUEST_TIMEOUT: ${LLM_REQUEST_TIMEOUT:-300}
      LLM_REQUEST_RETRIES: ${LLM_REQUEST_RETRIES:-4}
      LLM_RETRY_BACKOFF_BASE: ${LLM_RETRY_BACKOFF_BASE:-2.0}
      LLM_CHAT_FALLBACK_ON_EOF: ${LLM_CHAT_FALLBACK_ON_EOF:-true}
      PHASE1_TIMEOUT: ${PHASE1_TIMEOUT:-120}
      PHASE2_TIMEOUT: ${PHASE2_TIMEOUT:-300}
      PHASE2_PROBE_TIMEOUT: ${PHASE2_PROBE_TIMEOUT:-60}
      FRR_TARGET_TIMEOUT: ${FRR_TARGET_TIMEOUT:-180}
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./backend:/app/backend
      - ./adapters:/app/adapters
      - ./data:/app/data
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  chromadata:
